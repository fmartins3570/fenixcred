# Configuração Nginx para Cache Agressivo de Assets Estáticos
# Site: fenixcredbr.com.br
# Objetivo: Reduzir crawl budget desperdiçado (71% em recursos)

server {
    listen 80;
    listen [::]:80;
    server_name fenixcredbr.com.br www.fenixcredbr.com.br;
    
    # Redirecionar HTTP para HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fenixcredbr.com.br www.fenixcredbr.com.br;
    
    root /var/www/fenixcredbr.com.br/dist;
    index index.html;
    
    # SSL configuration (ajustar conforme seu certificado)
    # ssl_certificate /path/to/certificate.crt;
    # ssl_certificate_key /path/to/private.key;
    
    # HTTP/2 Server Push - Recursos críticos
    # Nota: Server Push foi deprecado em HTTP/3, mas ainda útil para HTTP/2
    # Para recursos críticos, use preload no HTML ao invés de Server Push
    # location = /index.html {
    #     http2_push /assets/index-*.css;
    #     http2_push /assets/index-*.js;
    #     http2_push /assets/logo-fenix-cred-*.webp;
    # }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;
    gzip_comp_level 6;
    
    # Desabilitar logs para assets estáticos (economia de I/O)
    location ~* \.(js|css|jpg|jpeg|png|gif|svg|webp|ico|woff|woff2|ttf|eot)$ {
        access_log off;
        log_not_found off;
        
        # Cache agressivo: 1 ano (31536000 segundos)
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        expires 1y;
        
        # Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # CORS (se necessário)
        # add_header Access-Control-Allow-Origin "*";
    }
    
    # Cache para fontes
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        access_log off;
        log_not_found off;
        
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
    }
    
    # HTML - cache curto (1 hora) para permitir atualizações
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        expires 1h;
    }
    
    # Arquivos de configuração (robots.txt, sitemap.xml) - cache médio
    location ~* \.(txt|xml)$ {
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }
    
    # SPA routing - redirecionar todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache curto para index.html
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        expires 1h;
    }
    
    # Bloquear acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Bloquear acesso a arquivos de configuração
    location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # CSP - Content Security Policy (segurança XSS)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://www.google-analytics.com https://maps.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests;" always;
    
    # HSTS - HTTP Strict Transport Security (força HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # COOP - Cross-Origin-Opener-Policy (isolamento de origem)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    
    # COEP - Cross-Origin-Embedder-Policy
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    
    # CORP - Cross-Origin-Resource-Policy
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    
    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
